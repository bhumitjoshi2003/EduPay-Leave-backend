name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/EduPay-Leave-backend
            git pull origin main

            docker stop ias-backend-container || true
            docker rm ias-backend-container || true

            docker build -t ias-backend .

            docker run -d \
              --name ias-backend-container \
              -p 8080:8080 \
              -e JWT_PRIVATE_KEY_PATH=/app/privateKey.pem \
              -e JWT_PUBLIC_KEY_PATH=/app/publicKey.pem \
              ias-backend
