spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Extra production safety
server.error.include-stacktrace=never
server.error.include-message=never

# HTTP security
auth.cookie.secure=true
# None (with Secure=true) so cookies are sent on cross-origin requests from school
# subdomains (e.g. indra-academy.edunexify.co.in) to the root-domain API
# (edunexify.co.in/api). Both are same-site (shared eTLD+1 = edunexify.co.in) so
# Chrome's third-party cookie blocking does NOT apply. SameSite=Lax was blocking
# cookies on cross-origin XHR from subdomains to the root domain API.
auth.cookie.sameSite=None