spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Extra production safety
server.error.include-stacktrace=never
server.error.include-message=never

# HTTP security
auth.cookie.secure=true
# Lax (not Strict) so cookies are sent on top-level navigations from the address bar
# or links. Both the root domain and school subdomains are same-site, so Lax gives
# full cross-subdomain cookie sharing while still blocking actual cross-site forgery.
auth.cookie.sameSite=Lax